<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMA FACADES | Social Hub</title>
    <!-- Link to your main CSS file -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
    <div class="header-container">
        <a href="index.html" class="logo">
            <img src="../images/logo.jpeg" alt="LAMA FACADES Logo">
        </a>

        <!-- The Menu Toggle (Hidden Checkbox) -->
        <input type="checkbox" id="menu-toggle" class="menu-checkbox">
        
        <!-- The Hamburger Icon -->
        <label for="menu-toggle" class="hamburger-label">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <!-- The Navigation Dropdown -->
        <nav class="main-nav">
            <ul>
                <li><a href="index.html" >Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="socials.html" class="active">Socials</a></li>
            </ul>
        </nav>
    </div>
</header>

    <section class="social-hero">
        <h1>Follow Our Projects</h1>
        <p>Real-time updates from our latest EWI and Rendering sites across the UK.</p>
    </section>

    <main class="feed-container">
        
        <!-- Instagram Column (Behold API) -->
        <div class="social-column">
            <h2><i class="fa-brands fa-instagram"></i> Instagram</h2>
            <div class="feed-content">
                <behold-widget feed-id="uHt9GmVxTL19Er0CAeOq"></behold-widget>
                <script>
                  (() => {
                    const d=document,s=d.createElement("script");s.type="module";
                    s.src="https://w.behold.so/widget.js";d.head.append(s);
                  })();
                </script>
            </div>
            <a href="https://www.instagram.com/lama.facades/" target="_blank" class="btn btn-insta">View Instagram</a>
        </div>

        <!-- Facebook Column (Meta API) -->
        <div class="social-column">
            <h2><i class="fa-brands fa-facebook"></i> Facebook</h2>
            <div class="feed-content">
                <div id="fb-root"></div>
                <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_GB/sdk.js#xfbml=1&version=v19.0"></script>
                <div class="fb-page" 
                    data-href="https://www.facebook.com/profile.php?id=61589238324711" 
                    data-tabs="timeline" 
                    data-width="500" 
                    data-small-header="false" 
                    data-adapt-container-width="true" 
                    data-hide-cover="false" 
                    data-show-facepile="true">
                </div>
            </div>
            <a href="https://www.facebook.com/profile.php?id=61589238324711" target="_blank" class="btn btn-fb">Visit Facebook</a>
        </div>

        <!-- TikTok Column (TikTok API) -->
        <div class="social-column">
            <h2><i class="fa-brands fa-tiktok"></i> TikTok</h2>
            <div class="feed-content">
                <blockquote class="tiktok-embed" 
                    cite="https://www.tiktok.com/@lamafacades" 
                    data-unique-id="lamafacades" 
                    data-embed-type="creator" 
                    style="max-width: 780px; min-width: 288px;">
                    <section>
                        <a target="_blank" href="https://www.tiktok.com/@lamafacades?refer=creator_embed">@lamafacades</a>
                    </section>
                </blockquote>
                <script async src="https://www.tiktok.com/embed.js"></script>
            </div>
            <a href="https://www.tiktok.com/@lamafacades" target="_blank" class="btn btn-tiktok">Follow on TikTok</a>
        </div>

    </main>

<footer class="main-footer">
    <div class="footer-container">
        <p>&copy; 2026 LAMA FACADES LTD. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
